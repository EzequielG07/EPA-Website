<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Panel de Administración | Studio EPA</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            'logo-fucsia': '#ee2a7b',
                            'logo-cian': '#00aeef',
                        },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-4">
        <!-- PANTALLA DE LOGIN -->
        <main
            id="seccion-login"
            class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 sm:p-8 shadow-2xl relative hidden"
        >
            <div class="mb-6 text-center">
                <div
                    class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] mb-3 shadow-lg shadow-logo-fucsia/20"
                >
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                        />
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-white">Iniciar Sesión</h1>
                <p class="text-xs text-zinc-400 mt-1">Ingresá tus credenciales para administrar Studio EPA.</p>
            </div>

            <form id="form-login" class="space-y-4">
                <div>
                    <label
                        for="login-email"
                        class="block text-xs font-semibold uppercase tracking-wider text-zinc-300 mb-2"
                    >
                        Correo Electrónico
                    </label>
                    <input
                        type="email"
                        id="login-email"
                        placeholder="admin@estudioepa.com"
                        required
                        class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-logo-fucsia focus:border-transparent transition-all placeholder:text-zinc-600"
                    />
                </div>

                <div>
                    <label
                        for="login-password"
                        class="block text-xs font-semibold uppercase tracking-wider text-zinc-300 mb-2"
                    >
                        Contraseña
                    </label>
                    <input
                        type="password"
                        id="login-password"
                        placeholder="••••••••"
                        required
                        class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-logo-fucsia focus:border-transparent transition-all placeholder:text-zinc-600"
                    />
                </div>

                <button
                    type="submit"
                    id="btn-login"
                    class="w-full py-3 px-4 bg-gradient-to-r from-logo-fucsia to-logo-cian font-semibold text-sm rounded-xl text-white hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-zinc-900 focus:ring-logo-fucsia flex items-center justify-center gap-2 shadow-lg shadow-logo-fucsia/25"
                >
                    <span id="btn-login-text">Ingresar al Panel</span>
                </button>
            </form>

            <div
                id="mensaje-login-error"
                class="mt-4 p-3 rounded-xl text-xs text-center font-medium bg-rose-500/10 text-rose-400 border border-rose-500/20 hidden"
            ></div>
        </main>

        <!-- PANEL DE ADMINISTRACIÓN -->
        <main
            id="seccion-admin"
            class="w-full max-w-lg bg-zinc-900 border border-zinc-800 rounded-2xl p-6 sm:p-8 shadow-2xl relative hidden"
        >
            <button
                id="btn-logout"
                class="absolute top-4 right-4 text-xs font-semibold text-zinc-400 hover:text-rose-400 transition-colors flex items-center gap-1 bg-zinc-950 px-3 py-1.5 rounded-lg border border-zinc-800"
            >
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                    />
                </svg>
                Salir
            </button>

            <div class="mb-6 text-center">
                <div
                    class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] mb-3 shadow-lg shadow-logo-fucsia/20"
                >
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 012.828 0L20 4.828a2 2 0 010 2.828l-8.586 8.586a2 2 0 01-.707.393l-3.328 1.109a1 1 0 01-1.243-1.243l1.109-3.328a2 2 0 01.393-.707L16.586 2.586z"
                        />
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-white">Gestión de Tarjetas</h1>
                <p class="text-xs text-zinc-400 mt-1">Creá, modificá o eliminá tarjetas de tu sitio.</p>
            </div>

            <form id="form-tarjeta" class="space-y-4">
                <!-- Selector Dinámico + Botón "Nueva Tarjeta" -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label
                            for="select-tarjeta"
                            class="block text-xs font-semibold uppercase tracking-wider text-zinc-300"
                        >
                            Seleccionar Tarjeta
                        </label>
                        <button
                            type="button"
                            id="btn-nueva-tarjeta"
                            class="text-xs font-semibold text-logo-cian hover:underline"
                        >
                            + Crear Nueva
                        </button>
                    </div>
                    <select
                        id="select-tarjeta"
                        class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-logo-fucsia focus:border-transparent transition-all cursor-pointer"
                    >
                        <option value="">Cargando tarjetas...</option>
                    </select>
                </div>

                <div>
                    <label
                        for="tarjeta-span"
                        class="block text-xs font-semibold uppercase tracking-wider text-zinc-300 mb-2"
                    >
                        Etiqueta / Subtítulo (&lt;span&gt;)
                    </label>
                    <input
                        type="text"
                        id="tarjeta-span"
                        placeholder="Ej: Desarrollo Web"
                        required
                        class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-logo-fucsia focus:border-transparent transition-all placeholder:text-zinc-600"
                    />
                </div>

                <div>
                    <label
                        for="tarjeta-h3"
                        class="block text-xs font-semibold uppercase tracking-wider text-zinc-300 mb-2"
                    >
                        Título Principal (&lt;h3&gt;)
                    </label>
                    <input
                        type="text"
                        id="tarjeta-h3"
                        placeholder="Ej: Sitios E-commerce a Medida"
                        required
                        class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-logo-fucsia focus:border-transparent transition-all placeholder:text-zinc-600"
                    />
                </div>

                <div>
                    <label
                        for="tarjeta-p"
                        class="block text-xs font-semibold uppercase tracking-wider text-zinc-300 mb-2"
                    >
                        Descripción (&lt;p&gt;)
                    </label>
                    <textarea
                        id="tarjeta-p"
                        rows="3"
                        placeholder="Escribí aquí la descripción..."
                        required
                        class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-logo-fucsia focus:border-transparent transition-all placeholder:text-zinc-600 resize-none"
                    ></textarea>
                </div>

                <!-- CAMPO NUEVO: Red Social / Enlace -->
                <div>
                    <label
                        for="tarjeta-link"
                        class="block text-xs font-semibold uppercase tracking-wider text-zinc-300 mb-2"
                    >
                        Enlace / Red Social (&lt;a href="..."&gt;)
                    </label>
                    <input
                        type="url"
                        id="tarjeta-link"
                        placeholder="https://instagram.com/tu_usuario"
                        required
                        class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-logo-fucsia focus:border-transparent transition-all placeholder:text-zinc-600"
                    />
                </div>

                <div class="flex gap-3 pt-2">
                    <button
                        type="submit"
                        id="btn-guardar-tarjeta"
                        class="flex-1 py-3 px-4 bg-gradient-to-r from-logo-fucsia to-logo-cian font-semibold text-sm rounded-xl text-white hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-zinc-900 focus:ring-logo-fucsia flex items-center justify-center gap-2 shadow-lg shadow-logo-fucsia/25"
                    >
                        <span id="btn-text">Guardar Tarjeta</span>
                    </button>

                    <button
                        type="button"
                        id="btn-eliminar-tarjeta"
                        class="py-3 px-4 bg-rose-600/20 text-rose-400 border border-rose-500/30 hover:bg-rose-600/30 font-semibold text-sm rounded-xl transition-all focus:outline-none hidden"
                    >
                        Eliminar
                    </button>
                </div>
            </form>

            <div id="mensaje-feedback" class="mt-4 p-3 rounded-xl text-xs text-center font-medium hidden"></div>
        </main>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

        <script>
            const firebaseConfig = {
                apiKey: 'AIzaSyCTEKHrjvi-rZKuV7F6uF8144Oiz8kC-Xs',
                authDomain: 'epa-studio-web.firebaseapp.com',
                projectId: 'epa-studio-web',
                storageBucket: 'epa-studio-web.firebasestorage.app',
                messagingSenderId: '532664420233',
                appId: '1:532664420233:web:fafb06c49b5ba2ca2c8358',
            };

            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const auth = firebase.auth();
            const db = firebase.firestore();

            const seccionLogin = document.getElementById('seccion-login');
            const seccionAdmin = document.getElementById('seccion-admin');

            const formLogin = document.getElementById('form-login');
            const loginEmail = document.getElementById('login-email');
            const loginPassword = document.getElementById('login-password');
            const btnLogin = document.getElementById('btn-login');
            const btnLoginText = document.getElementById('btn-login-text');
            const mensajeLoginError = document.getElementById('mensaje-login-error');
            const btnLogout = document.getElementById('btn-logout');

            const formTarjeta = document.getElementById('form-tarjeta');
            const selectTarjeta = document.getElementById('select-tarjeta');
            const btnNuevaTarjeta = document.getElementById('btn-nueva-tarjeta');
            const inputSpan = document.getElementById('tarjeta-span');
            const inputH3 = document.getElementById('tarjeta-h3');
            const inputP = document.getElementById('tarjeta-p');
            const inputLink = document.getElementById('tarjeta-link');
            const btnGuardarTarjeta = document.getElementById('btn-guardar-tarjeta');
            const btnEliminarTarjeta = document.getElementById('btn-eliminar-tarjeta');
            const btnText = document.getElementById('btn-text');

            let timerFeedback = null;
            let tarjetasCache = [];
            let idTarjetaSeleccionada = null;

            // 1. Manejo de Auth
            auth.onAuthStateChanged((user) => {
                if (user) {
                    seccionLogin.classList.add('hidden');
                    seccionAdmin.classList.remove('hidden');
                    cargarListaTarjetas();
                } else {
                    seccionLogin.classList.remove('hidden');
                    seccionAdmin.classList.add('hidden');
                }
            });

            // 2. Submit Login
            formLogin.addEventListener('submit', async (e) => {
                e.preventDefault();
                mensajeLoginError.classList.add('hidden');
                btnLogin.disabled = true;
                btnLogin.classList.add('opacity-50');
                btnLoginText.innerText = 'Verificando...';

                try {
                    await auth.signInWithEmailAndPassword(loginEmail.value.trim(), loginPassword.value);
                    loginEmail.value = '';
                    loginPassword.value = '';
                } catch (error) {
                    mensajeLoginError.classList.remove('hidden');
                    mensajeLoginError.innerText = 'Credenciales incorrectas o error de conexión.';
                } finally {
                    btnLogin.disabled = false;
                    btnLogin.classList.remove('opacity-50');
                    btnLoginText.innerText = 'Ingresar al Panel';
                }
            });

            // 3. Logout
            btnLogout.addEventListener('click', () => auth.signOut());

            // 4. Cargar lista dinámica de tarjetas desde Firestore
            async function cargarListaTarjetas(idASeleccionar = null) {
                try {
                    const snapshot = await db.collection('tarjetas').orderBy('createdAt', 'asc').get();
                    tarjetasCache = [];
                    selectTarjeta.innerHTML = '';

                    if (snapshot.empty) {
                        selectTarjeta.innerHTML = '<option value="">Sin tarjetas creadas</option>';
                        prepararModoCreacion();
                        return;
                    }

                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        tarjetasCache.push({ id: doc.id, ...data });

                        const option = document.createElement('option');
                        option.value = doc.id;
                        option.textContent = data.h3 ? data.h3 : `Tarjeta (${doc.id.substring(0, 5)})`;
                        selectTarjeta.appendChild(option);
                    });

                    const targetId = idASeleccionar || tarjetasCache[0].id;
                    selectTarjeta.value = targetId;
                    seleccionarTarjeta(targetId);
                } catch (error) {
                    console.error('Error al cargar lista de tarjetas:', error);
                    mostrarMensaje('Error al obtener la lista de tarjetas.', false);
                }
            }

            // 5. Seleccionar Tarjeta para editar
            function seleccionarTarjeta(id) {
                idTarjetaSeleccionada = id;
                const tarjeta = tarjetasCache.find((t) => t.id === id);

                if (tarjeta) {
                    inputSpan.value = tarjeta.span || '';
                    inputH3.value = tarjeta.h3 || '';
                    inputP.value = tarjeta.p || '';
                    inputLink.value = tarjeta.link || '';
                    btnText.innerText = 'Actualizar Tarjeta';
                    btnEliminarTarjeta.classList.remove('hidden');
                }
            }

            selectTarjeta.addEventListener('change', (e) => {
                if (e.target.value) seleccionarTarjeta(e.target.value);
            });

            // 6. Preparar Modo Creación (Limpiar campos)
            function prepararModoCreacion() {
                idTarjetaSeleccionada = null;
                inputSpan.value = '';
                inputH3.value = '';
                inputP.value = '';
                inputLink.value = '';
                btnText.innerText = 'Crear Nueva Tarjeta';
                btnEliminarTarjeta.classList.add('hidden');
                inputSpan.focus();
            }

            btnNuevaTarjeta.addEventListener('click', prepararModoCreacion);

            // 7. Guardar o Actualizar Tarjeta
            formTarjeta.addEventListener('submit', async (e) => {
                e.preventDefault();

                const spanTexto = inputSpan.value.trim();
                const h3Texto = inputH3.value.trim();
                const pTexto = inputP.value.trim();
                const linkTexto = inputLink.value.trim();

                btnGuardarTarjeta.disabled = true;
                btnGuardarTarjeta.classList.add('opacity-50');
                btnText.innerText = 'Guardando...';

                try {
                    if (idTarjetaSeleccionada) {
                        // ACTUALIZAR EXISTENTE
                        await db.collection('tarjetas').doc(idTarjetaSeleccionada).update({
                            span: spanTexto,
                            h3: h3Texto,
                            p: pTexto,
                            link: linkTexto,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        });
                        mostrarMensaje('¡Tarjeta actualizada con éxito!', true);
                        await cargarListaTarjetas(idTarjetaSeleccionada);
                    } else {
                        // CREAR NUEVA
                        const docRef = await db.collection('tarjetas').add({
                            span: spanTexto,
                            h3: h3Texto,
                            p: pTexto,
                            link: linkTexto,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        });
                        mostrarMensaje('¡Nueva tarjeta agregada con éxito!', true);
                        await cargarListaTarjetas(docRef.id);
                    }
                } catch (error) {
                    console.error('Error al guardar tarjeta:', error);
                    mostrarMensaje('Ocurrió un error al intentar guardar.', false);
                } finally {
                    btnGuardarTarjeta.disabled = false;
                    btnGuardarTarjeta.classList.remove('opacity-50');
                }
            });

            // 8. Eliminar Tarjeta
            btnEliminarTarjeta.addEventListener('click', async () => {
                if (!idTarjetaSeleccionada) return;

                const confirmar = confirm(
                    '¿Estás seguro de que querés eliminar esta tarjeta? Esta acción no se puede deshacer.',
                );
                if (!confirmar) return;

                try {
                    await db.collection('tarjetas').doc(idTarjetaSeleccionada).delete();
                    mostrarMensaje('Tarjeta eliminada correctamente.', true);
                    await cargarListaTarjetas();
                } catch (error) {
                    console.error('Error al eliminar tarjeta:', error);
                    mostrarMensaje('Error al eliminar la tarjeta.', false);
                }
            });

            // 9. Feedback Helper
            function mostrarMensaje(texto, esExito) {
                const feedback = document.getElementById('mensaje-feedback');
                if (timerFeedback) clearTimeout(timerFeedback);

                feedback.innerText = texto;
                feedback.className = `mt-4 p-3 rounded-xl text-xs text-center font-medium block ${
                    esExito
                        ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
                        : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'
                }`;

                timerFeedback = setTimeout(() => {
                    feedback.classList.add('hidden');
                }, 4000);
            }
        </script>
    </body>
</html>
